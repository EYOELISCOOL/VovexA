<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VOVEX — Technology Holding Company</title>
<meta name="description" content="VOVEX is a global technology holding company building platforms, systems, and ventures across AI, media, infrastructure, commerce, and digital systems."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Noto+Sans+Ethiopic:wght@300;400;500&family=Noto+Sans+Arabic:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; background: #fff; }

/* ─── TOKENS ─── */
:root {
  --white: #ffffff;
  --off-white: #f5f5f7;
  --section-dark: #1d1d1f;
  --headline: #1d1d1f;
  --body: #1d1d1f;
  --secondary: #6e6e73;
  --tertiary: #86868b;
  --link: #0066cc;
  --link-hover: #0077ed;
  --divider: rgba(0,0,0,0.08);
  --nav-bg: rgba(255,255,255,0.85);
  --card-radius: 18px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  --font-ethiopic: 'Noto Sans Ethiopic', 'Nyala', var(--font);
  --font-arabic: 'Noto Sans Arabic', var(--font);
}

body {
  font-family: var(--font);
  background: var(--white);
  color: var(--body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

/* ─── LANGUAGE BAR ─── */
#langbar {
  background: var(--section-dark);
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 1000;
  overflow-x: auto;
  scrollbar-width: none;
}
#langbar::-webkit-scrollbar { display: none; }

.lbtn {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.01em;
  color: rgba(255,255,255,0.5);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 14px;
  height: 40px;
  white-space: nowrap;
  transition: color 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1.2;
  border-right: 1px solid rgba(255,255,255,0.07);
  font-family: var(--font);
  position: relative;
}
.lbtn:last-child { border-right: none; }
.lbtn .ln { font-size: 8.5px; opacity: 0.5; margin-top: 1px; }
.lbtn:hover { color: rgba(255,255,255,0.85); }
.lbtn.active { color: #ffffff; }
.lbtn.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 14px; right: 14px;
  height: 2px;
  background: #0066cc;
  border-radius: 2px 2px 0 0;
}

/* ─── NAV ─── */
#nav {
  position: sticky;
  top: 40px;
  z-index: 999;
  height: 44px;
  background: var(--nav-bg);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--divider);
}
.nav-inner {
  width: 100%;
  max-width: 980px;
  padding: 0 22px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 0;
}
.nav-logo {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--headline);
  text-decoration: none;
  justify-self: start;
}
.nav-links {
  display: flex;
  align-items: center;
  gap: 0;
  list-style: none;
}
.nav-links a {
  font-size: 12px;
  font-weight: 400;
  color: var(--secondary);
  text-decoration: none;
  padding: 0 10px;
  height: 44px;
  display: flex;
  align-items: center;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--headline); }
.nav-right {
  justify-self: end;
  display: flex;
  align-items: center;
  gap: 18px;
}
.nav-contact {
  font-size: 12px;
  font-weight: 400;
  color: var(--link);
  text-decoration: none;
  transition: color 0.2s;
}
.nav-contact:hover { color: var(--link-hover); text-decoration: underline; }

/* ═══════════════════════════════════════════════
   LEADERSHIP — MONUMENTAL
   ═══════════════════════════════════════════════ */
#leadership {
  --ld-black: #000000;
  --ld-white: #ffffff;
  --ld-gray-50: #fafafa;
  --ld-gray-100: #f0f0f0;
  --ld-gray-200: #d4d4d4;
  --ld-gray-300: #a3a3a3;
  --ld-gray-400: #737373;
  --ld-gray-500: #525252;
  --ld-gray-600: #404040;
  --ld-gray-700: #262626;
  --ld-gray-800: #171717;
  --ld-gray-900: #0a0a0a;
  --ld-blue: #0066cc;
  
  background: var(--ld-white);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  position: relative;
  overflow: hidden;
}

/* Background */
.ld-bg-grid {
  position: absolute;
  inset: 0;
  background-image: 
    linear-gradient(rgba(0,0,0,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.018) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none;
  z-index: 0;
  mask-image: radial-gradient(ellipse 60% 50% at 50% 30%, black 15%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 60% 50% at 50% 30%, black 15%, transparent 70%);
}

.ld-bg-gradient {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  filter: blur(160px);
}

.ld-bg-gradient-1 {
  width: 800px;
  height: 800px;
  background: rgba(0,102,204,0.02);
  top: -200px;
  right: -300px;
}

.ld-bg-gradient-2 {
  width: 600px;
  height: 600px;
  background: rgba(0,0,0,0.012);
  bottom: 10%;
  left: -200px;
}

/* ═══ STATEMENT ═══ */
.ld-statement {
  padding: 180px 40px 100px;
  position: relative;
  z-index: 1;
}

.ld-statement-inner {
  max-width: 880px;
  margin: 0 auto;
}

.ld-statement-label {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 56px;
}

.ld-statement-label-line {
  display: block;
  width: 48px;
  height: 1px;
  background: var(--ld-gray-300);
}

.ld-statement-label-text {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ld-gray-500);
}

.ld-statement-headline {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.ld-statement-headline-line {
  display: block;
  font-size: clamp(48px, 7vw, 84px);
  font-weight: 700;
  letter-spacing: -0.035em;
  line-height: 1.04;
  color: var(--ld-black);
}

.ld-statement-headline-line:last-child {
  font-weight: 300;
  color: var(--ld-gray-400);
}

/* ═══ FOUNDER ═══ */
.ld-founder {
  padding: 0 40px 100px;
  position: relative;
  z-index: 1;
}

.ld-founder-inner {
  max-width: 880px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 100px;
  align-items: start;
}

.ld-founder-visual {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: sticky;
  top: 120px;
}

.ld-founder-portrait {
  width: 280px;
  height: 360px;
  background: linear-gradient(165deg, #1a1a1c 0%, #252527 40%, #111112 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  z-index: 2;
}

.ld-founder-portrait-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
  z-index: 1;
}

.ld-founder-portrait-fallback {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 2;
}

.ld-founder-initials {
  font-size: 48px;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: rgba(255,255,255,0.8);
}

.ld-founder-portrait-shine {
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(
    45deg,
    transparent 30%,
    rgba(255,255,255,0.015) 50%,
    transparent 70%
  );
  pointer-events: none;
  z-index: 3;
}

.ld-founder-portrait-shadow {
  width: 280px;
  height: 20px;
  background: rgba(0,0,0,0.06);
  filter: blur(16px);
  margin-top: -10px;
  z-index: 1;
}

.ld-founder-content {
  max-width: 480px;
  padding-top: 8px;
}

.ld-founder-overline {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ld-blue);
  margin-bottom: 20px;
  padding: 6px 14px;
  background: rgba(0,102,204,0.04);
  border-radius: 4px;
}

.ld-founder-overline-line {
  display: block;
  width: 16px;
  height: 1px;
  background: var(--ld-blue);
}

.ld-founder-name {
  font-size: clamp(36px, 5vw, 52px);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.05;
  color: var(--ld-black);
  margin-bottom: 24px;
}

.ld-founder-divider {
  width: 40px;
  height: 2px;
  background: var(--ld-gray-200);
  margin-bottom: 28px;
}

.ld-founder-bio {
  font-size: 16px;
  font-weight: 400;
  line-height: 1.7;
  color: var(--ld-gray-500);
  margin-bottom: 28px;
}

.ld-founder-quote {
  padding-left: 20px;
  border-left: 2px solid var(--ld-blue);
  margin-bottom: 32px;
  font-size: 16px;
  font-weight: 400;
  line-height: 1.5;
  color: var(--ld-gray-400);
  font-style: italic;
}

.ld-founder-meta {
  display: flex;
  gap: 48px;
}

.ld-founder-meta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.ld-founder-meta-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ld-gray-300);
}

.ld-founder-meta-value {
  font-size: 13px;
  font-weight: 500;
  color: var(--ld-gray-700);
}

/* ═══ TEAM ═══ */
.ld-team {
  padding: 0 40px 100px;
  position: relative;
  z-index: 1;
}

.ld-team-inner {
  max-width: 880px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  padding-top: 80px;
  border-top: 1px solid var(--ld-gray-100);
}

.ld-team-member-visual {
  display: flex;
  justify-content: center;
  margin-bottom: 36px;
}

.ld-team-member-portrait {
  width: 160px;
  height: 200px;
  background: linear-gradient(165deg, #1a1a1c 0%, #252527 40%, #111112 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.ld-team-member-portrait-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
  z-index: 1;
}

.ld-team-member-portrait-fallback {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 2;
}

.ld-team-member-portrait-fallback span {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.03em;
  color: rgba(255,255,255,0.8);
}

.ld-team-member-portrait-shine {
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: linear-gradient(
    45deg,
    transparent 30%,
    rgba(255,255,255,0.015) 50%,
    transparent 70%
  );
  pointer-events: none;
  z-index: 3;
}

.ld-team-member-content {
  max-width: 380px;
}

.ld-team-member-overline {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ld-blue);
  margin-bottom: 12px;
  padding: 4px 10px;
  background: rgba(0,102,204,0.04);
  border-radius: 4px;
}

.ld-team-member-name {
  font-size: clamp(22px, 3vw, 28px);
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.1;
  color: var(--ld-black);
  margin-bottom: 16px;
}

.ld-team-member-divider {
  width: 28px;
  height: 2px;
  background: var(--ld-gray-200);
  margin-bottom: 20px;
}

.ld-team-member-bio {
  font-size: 15px;
  font-weight: 400;
  line-height: 1.65;
  color: var(--ld-gray-500);
  margin-bottom: 24px;
}

.ld-team-member-meta {
  display: flex;
  gap: 32px;
}

.ld-team-member-meta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.ld-team-member-meta-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ld-gray-300);
}

.ld-team-member-meta-value {
  font-size: 12px;
  font-weight: 500;
  color: var(--ld-gray-600);
}

/* ═══ GLOBAL ═══ */
.ld-global {
  padding: 56px 40px;
  border-top: 1px solid var(--ld-gray-100);
  position: relative;
  z-index: 1;
}

.ld-global-inner {
  max-width: 880px;
  margin: 0 auto;
  display: flex;
  align-items: baseline;
  gap: 32px;
}

.ld-global-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ld-gray-400);
  white-space: nowrap;
}

.ld-global-list {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.ld-global-item {
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.ld-global-city {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ld-black);
}

.ld-global-type {
  font-size: 12px;
  font-weight: 400;
  color: var(--ld-gray-400);
}

/* ═══ RESPONSIVE ═══ */
@media (max-width: 1024px) {
  .ld-founder-inner {
    grid-template-columns: 280px 1fr;
    gap: 64px;
  }
  
  .ld-founder-portrait {
    width: 240px;
    height: 310px;
  }
}

@media (max-width: 768px) {
  .nav-links { display: none; }
  .nav-inner { grid-template-columns: auto 1fr; }
  .nav-right { display: none; }
  
  .ld-statement {
    padding: 120px 24px 72px;
  }
  
  .ld-statement-headline-line {
    font-size: clamp(36px, 10vw, 52px);
  }
  
  .ld-founder {
    padding: 0 24px 72px;
  }
  
  .ld-founder-inner {
    grid-template-columns: 1fr;
    gap: 40px;
  }
  
  .ld-founder-visual {
    position: static;
    order: -1;
  }
  
  .ld-founder-portrait {
    width: 200px;
    height: 260px;
  }
  
  .ld-founder-content {
    max-width: 100%;
    text-align: center;
  }
  
  .ld-founder-divider {
    margin-left: auto;
    margin-right: auto;
  }
  
  .ld-founder-quote {
    text-align: left;
  }
  
  .ld-founder-meta {
    justify-content: center;
  }
  
  .ld-team {
    padding: 0 24px 72px;
  }
  
  .ld-team-inner {
    grid-template-columns: 1fr;
    gap: 56px;
    padding-top: 56px;
  }
  
  .ld-team-member {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 32px;
    align-items: start;
  }
  
  .ld-team-member-visual {
    margin-bottom: 0;
  }
  
  .ld-team-member-portrait {
    width: 140px;
    height: 180px;
  }
  
  .ld-global {
    padding: 40px 24px;
  }
  
  .ld-global-inner {
    flex-direction: column;
    gap: 16px;
  }
}

@media (max-width: 480px) {
  .ld-statement {
    padding: 80px 20px 56px;
  }
  
  .ld-founder {
    padding: 0 20px 56px;
  }
  
  .ld-team {
    padding: 0 20px 56px;
  }
  
  .ld-team-inner {
    padding-top: 40px;
    gap: 40px;
  }
  
  .ld-team-member {
    grid-template-columns: 1fr;
    gap: 20px;
    text-align: center;
  }
  
  .ld-team-member-content {
    max-width: 100%;
  }
  
  .ld-team-member-divider {
    margin-left: auto;
    margin-right: auto;
  }
  
  .ld-team-member-meta {
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }
  
  .ld-founder-meta {
    flex-direction: column;
    gap: 16px;
    align-items: center;
  }
  
  .ld-global {
    padding: 32px 20px;
  }
}

/* ─── FOOTER ─── */
footer {
  background: var(--off-white);
  border-top: 1px solid var(--divider);
  padding: 28px 20px;
}
.footer-inner {
  max-width: 980px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
.footer-logo {
  font-size: 13px;
  font-weight: 600;
  color: var(--secondary);
  letter-spacing: -0.01em;
}
.footer-copy {
  font-size: 12px;
  color: var(--tertiary);
}
.footer-links {
  display: flex;
  gap: 20px;
}
.footer-links a {
  font-size: 12px;
  color: var(--tertiary);
  text-decoration: none;
  transition: color 0.2s;
}
.footer-links a:hover { color: var(--link); }

@media (max-width: 768px) {
  .footer-inner { flex-direction: column; text-align: center; }
  .footer-links { flex-wrap: wrap; justify-content: center; }
  #langbar { justify-content: flex-start; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
}
</style>
</head>
<body>

<!-- ─── LANGUAGE BAR ─── -->
<div id="langbar" role="navigation" aria-label="Language selection">
  <button class="lbtn active" data-lang="en" onclick="setLang('en')">EN<span class="ln">English</span></button>
  <button class="lbtn" data-lang="am" onclick="setLang('am')">አማ<span class="ln">አማርኛ</span></button>
  <button class="lbtn" data-lang="nl" onclick="setLang('nl')">NL<span class="ln">Nederlands</span></button>
  <button class="lbtn" data-lang="om" onclick="setLang('om')">OM<span class="ln">Oromoo</span></button>
  <button class="lbtn" data-lang="ti" onclick="setLang('ti')">ትግ<span class="ln">ትግርኛ</span></button>
  <button class="lbtn" data-lang="sw" onclick="setLang('sw')">SW<span class="ln">Kiswahili</span></button>
  <button class="lbtn" data-lang="fr" onclick="setLang('fr')">FR<span class="ln">Français</span></button>
  <button class="lbtn" data-lang="ar" onclick="setLang('ar')">عر<span class="ln">العربية</span></button>
  <button class="lbtn" data-lang="zh" onclick="setLang('zh')">中文<span class="ln">普通话</span></button>
</div>

<!-- ─── NAV ─── -->
<nav id="nav" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a class="nav-logo" href="#hero">VOVEX</a>
    <ul class="nav-links" role="list">
      <li><a href="#manifesto" data-i18n="nav_about">About</a></li>
      <li><a href="#ventures" data-i18n="nav_ventures">Ventures</a></li>
      <li><a href="#ecosystem" data-i18n="nav_platforms">Platforms</a></li>
      <li><a href="#principles" data-i18n="nav_principles">Principles</a></li>
      <li><a href="#timeline" data-i18n="nav_timeline">Timeline</a></li>
    </ul>
    <div class="nav-right">
      <a class="nav-contact" href="#final" data-i18n="nav_contact">Contact</a>
    </div>
  </div>
</nav>


  <!-- Layer 4: Global Presence -->
  <div class="ld-global">
    <div class="ld-global-inner">
      <p class="ld-global-label">Global presence</p>
      <div class="ld-global-list">
