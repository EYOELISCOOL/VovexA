<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vovex Login</title>
<style>
  :root{
    --bg:#0b0b0d;
    --bg-raised:#141416;
    --line:#232326;
    --text:#f2f1ec;
    --muted:#9a9a96;
    --gold:#c9a227;
    --gold-dim:#8a7220;
    --error:#e05a4f;
    --radius:2px;
    --font-display: 'Georgia', 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    display:flex;
    flex-direction:column;
  }
  header.site{
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 5vw;border-bottom:1px solid var(--line);
  }
  .wordmark{font-family:var(--font-display);font-size:20px;letter-spacing:0.14em;text-transform:uppercase;font-weight:600;}
  .wordmark span{color:var(--gold);}
  .badge{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);padding:5px 10px;border-radius:var(--radius);}

  .login-shell{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
  .login-card{width:100%;max-width:380px;border:1px solid var(--line);background:var(--bg-raised);padding:40px 32px;border-radius:var(--radius);}
  .login-card h1{font-family:var(--font-display);font-weight:600;font-size:22px;margin:0 0 6px;}
  .login-card .subtitle{color:var(--muted);font-size:13px;line-height:1.6;margin:0 0 30px;}

  label{display:block;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .field{margin-bottom:20px;}
  input[type="text"], input[type="password"]{
    width:100%;background:#101012;border:1px solid var(--line);color:var(--text);
    font-family:var(--font-body);font-size:14px;padding:12px 14px;border-radius:var(--radius);
    outline:none;transition:border-color .15s ease;
  }
  input:focus{border-color:var(--gold-dim);}
  input::placeholder{color:#5b5b58;}

  button{cursor:pointer;border:none;font-family:var(--font-body);}
  .btn-primary{
    width:100%;background:var(--gold);color:#100e08;font-weight:700;font-size:14px;
    letter-spacing:0.03em;padding:14px 18px;border-radius:var(--radius);
    transition:background .15s ease, transform .1s ease;
  }
  .btn-primary:hover{background:#dab53a;}
  .btn-primary:active{transform:translateY(1px);}
  .btn-primary:disabled{opacity:0.55;cursor:not-allowed;}

  .error-msg{color:var(--error);font-size:13px;margin:-6px 0 18px;min-height:16px;}

  .login-hint{
    margin-top:22px;font-size:11.5px;color:#67675f;line-height:1.6;
    border-top:1px solid var(--line);padding-top:16px;
  }

  footer.site{
    border-top:1px solid var(--line);padding:20px 5vw 30px;color:var(--muted);
    font-size:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;
  }
</style>
</head>
<body>

<header class="site">
  <div class="wordmark">VOVEX<span>.</span></div>
  <div class="badge">Sign In</div>
</header>

<div class="login-shell">
  <div class="login-card">
    <h1>Sign In</h1>
    <p class="subtitle">Enter your credentials. You'll be taken straight to your page.</p>

    <form id="login-form" autocomplete="off">
      <div class="field">
        <label for="username">Sales ID</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="error-msg" id="login-error"></div>
      <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
    </form>

    <div class="login-hint">
      Accounts are issued by an administrator. Contact them if you need
      access or your credentials have changed.
    </div>
  </div>
</div>

<footer class="site">
  <span>© 2026 VOVEX. All rights reserved.</span>
  <span>Private access page</span>
</footer>

<script>
  const USERS = [
    { username: "VOV/0001/18", password: "3409", destination: "https://www.vovex.tech/USERS/abdu-dile.html" },
    { username: "VOV/0002/18", password: "8345", destination: "https://www.vovex.tech/USERS/atsede-gebremariam.html" },
    { username: "VOV/0003/18", password: "2433", destination: "https://www.vovex.tech/USERS/eyerusalem-negash.html" },
    { username: "VOV/0004/18", password: "4265", destination: "https://www.vovex.tech/USERS/gloria-ashebir.html"}, 
    { username: "VOV/0005/18", password: "9135", destination: "https://www.vovex.tech/USERS/kalkidan-melaku.html" },
    { username: "VOV/0006/18", password: "7423", destination: "https://www.vovex.tech/USERS/sara-kidane.html" },
    { username: "VOV/0007/18", password: "8426", destination: "https://www.vovex.tech/USERS/siparan-melkamu.html" },
  ];

  const form = document.getElementById("login-form");
  const errorEl = document.getElementById("login-error");
  const btn = document.getElementById("login-btn");

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    errorEl.textContent = "";
    btn.disabled = true;
    btn.textContent = "Signing in…";

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;

    const match = USERS.find(u =>
      u.username.toLowerCase() === username.toLowerCase() && u.password === password
    );

    setTimeout(() => {
      if (!match) {
        errorEl.textContent = "Invalid username or password.";
        btn.disabled = false;
        btn.textContent = "Sign In";
        return;
      }
      window.location.href = match.destination;
    }, 250);
  });
</script>

</body>
</html>
